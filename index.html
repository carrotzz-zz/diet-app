<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>四季药膳小助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>四季药膳小助手</h1>

    <!-- 大白话提醒卡片 -->
    <div class="panel health-card" id="healthCard">
      <div class="card-top">
        <span class="card-emoji" id="cardEmoji">🌿</span>
        <div class="card-head">
          <div class="card-headline" id="cardHeadline">加载中…</div>
          <div class="card-sub" id="cardSub"></div>
        </div>
      </div>
      <div class="card-section">
        <div class="section-label">你可能感觉</div>
        <div class="signal-list" id="bodySignals"></div>
      </div>
      <div class="card-section">
        <div class="section-label">建议这样做</div>
        <div class="do-list" id="doList"></div>
      </div>
      <div class="card-section row-split">
        <div>
          <div class="section-label eat">可以多吃</div>
          <div class="tag-list" id="eatList"></div>
        </div>
        <div>
          <div class="section-label avoid">尽量少碰</div>
          <div class="tag-list" id="avoidList"></div>
        </div>
      </div>
      <details class="why-details">
        <summary>为什么？<span class="summary-hint">（点击看原理）</span></summary>
        <div class="why-content" id="whyContent"></div>
      </details>
    </div>

    <!-- 天气小卡 -->
    <div class="panel weather-mini" id="weatherMini" style="display:none;">
      <div class="weather-mini-top">
        <span id="weatherIcon" class="w-icon">🌤</span>
        <span id="weatherSummary" class="w-text"></span>
      </div>
      <div id="weatherDeviation" class="w-deviation"></div>
    </div>

    <div id="quizSection">
      <h2>① 体质快速测评</h2>
      <p class="tip">请根据近半年的感受打分（1=完全没有，5=非常明显）</p>
      <div id="questions"></div>

      <h2>② 常驻城市</h2>
      <select id="citySelect">
        <option value="">-- 请选择城市 --</option>
      </select>
      <div id="climateNote" class="climate-note"></div>

      <h2>③ 饮食偏好（可多选）</h2>
      <div id="preferences">
        <label><input type="checkbox" value="素食"> 素食</label>
        <label><input type="checkbox" value="忌海鲜"> 忌海鲜</label>
        <label><input type="checkbox" value="忌辛辣"> 忌辛辣</label>
        <label><input type="checkbox" value="忌羊肉"> 忌羊肉</label>
        <label><input type="checkbox" value="忌酒"> 忌酒</label>
      </div>

      <button id="submitBtn" class="btn">✨ 生成我的药膳推荐</button>
    </div>

    <div id="resultSection" style="display: none;">
      <h2>📋 您的体质</h2>
      <p id="constitutionResult" class="highlight"></p>

      <!-- 结果页的运气指导 -->
      <div class="panel guide-panel" id="guidePanel">
        <div class="guide-headline" id="guideHeadline"></div>
        <div class="guide-body" id="guideBody"></div>
      </div>

      <h2>🍲 推荐药膳</h2>
      <div id="dietCards"></div>

      <button id="backBtn" class="btn secondary">⟲ 重新测评</button>
    </div>

    <footer class="disclaimer">
      ⚠️ 本工具仅为中医食疗养生参考，不构成医疗诊断。因个人体质差异，食用前请咨询专业医师。<br>
      天气数据来源：Open-Meteo（免费开放API）· 五运六气依据《黄帝内经》运气七篇推算
    </footer>
  </div>

  <script src="wuyunliuqi.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
