<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>四季药膳小助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>四季药膳小助手</h1>

    <!-- 冲突分析卡片 —— 首页主角 -->
    <div class="panel conflict-card" id="conflictCard" style="display:none;">
      <div class="conflict-hero" id="conflictHero"></div>
      <div class="conflict-list" id="conflictList"></div>
      <div class="conflict-foot" id="conflictFoot"></div>
      <details class="why-details">
        <summary>了解背后的原理<span class="summary-hint">（五运六气 + 气候分析）</span></summary>
        <div class="why-content" id="whyContent"></div>
      </details>
    </div>

    <!-- 未选城市时的占位 -->
    <div class="panel placeholder-card" id="placeholderCard">
      <div class="placeholder-icon">🌍</div>
      <div class="placeholder-text">
        <strong>选好家乡和现居城市</strong>后，这里会显示你的身体与环境之间的"冲突点"
      </div>
      <div class="placeholder-hint">越是不匹配，越需要调整饮食</div>
    </div>

    <div id="quizSection">
      <h2>① 体质快速测评</h2>
      <p class="tip">请根据近半年的感受打分（1=完全没有，5=非常明显）</p>
      <div id="questions"></div>

      <h2>② 你从哪里来，现在在哪里</h2>
      <div class="dual-city">
        <div class="city-box">
          <label class="city-label">🏠 家乡（从小生活的地方）</label>
          <select id="hometownSelect">
            <option value="">-- 请选择 --</option>
          </select>
          <p class="city-food-hint" id="hometownFood"></p>
        </div>
        <div class="city-arrow">→</div>
        <div class="city-box">
          <label class="city-label">📍 现居城市</label>
          <select id="citySelect">
            <option value="">-- 请选择 --</option>
          </select>
          <p class="city-food-hint" id="currentFood"></p>
        </div>
      </div>
      <div id="migrationNote" class="migration-note"></div>

      <h2>③ 饮食偏好（可多选）</h2>
      <div id="preferences">
        <label><input type="checkbox" value="素食"> 素食</label>
        <label><input type="checkbox" value="忌海鲜"> 忌海鲜</label>
        <label><input type="checkbox" value="忌辛辣"> 忌辛辣</label>
        <label><input type="checkbox" value="忌羊肉"> 忌羊肉</label>
        <label><input type="checkbox" value="忌酒"> 忌酒</label>
      </div>

      <button id="submitBtn" class="btn">✨ 生成我的药膳推荐</button>
    </div>

    <div id="resultSection" style="display: none;">
      <h2>📋 你的体质</h2>
      <p id="constitutionResult" class="highlight"></p>

      <!-- 结果页冲突分析 -->
      <div class="panel guide-panel" id="guidePanel">
        <div class="guide-headline">🎯 为什么推荐这些</div>
        <div class="guide-body" id="guideBody"></div>
      </div>

      <!-- 运气+气候背景 -->
      <div class="panel context-panel" id="contextPanel">
        <div class="context-head" id="contextHead"></div>
        <div class="context-body" id="contextBody"></div>
      </div>

      <h2>🍲 推荐药膳</h2>
      <div id="dietCards"></div>

      <button id="backBtn" class="btn secondary">⟲ 重新测评</button>
    </div>

    <footer class="disclaimer">
      ⚠️ 本工具仅为中医食疗养生参考，不构成医疗诊断。因个人体质差异，食用前请咨询专业医师。<br>
      天气数据：Open-Meteo · 五运六气依据《黄帝内经》运气七篇
    </footer>
  </div>

  <script src="wuyunliuqi.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
