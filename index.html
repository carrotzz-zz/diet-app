<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>四季药膳小助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>四季药膳小助手</h1>
    <p class="subtitle" id="seasonHint"></p>

    <!-- 五运六气面板 -->
    <div class="panel wylq-panel" id="wylqPanel">
      <div class="panel-header">
        <span class="panel-icon">☯</span>
        <span>五运六气 · 当前格局</span>
      </div>
      <div class="wylq-content" id="wylqContent">加载中…</div>
    </div>

    <!-- 天气面板 -->
    <div class="panel weather-panel" id="weatherPanel" style="display:none;">
      <div class="panel-header">
        <span class="panel-icon">🌤</span>
        <span>实时天气对照</span>
      </div>
      <div class="weather-content" id="weatherContent">
        <p class="muted">请先选择常驻城市，查看天气与运气对照</p>
      </div>
    </div>

    <div id="quizSection">
      <h2>① 体质快速测评</h2>
      <p class="tip">请根据近半年的感受打分（1=完全没有，5=非常明显）</p>
      <div id="questions"></div>

      <h2>② 常驻地区</h2>
      <select id="citySelect">
        <option value="">-- 请选择城市 --</option>
      </select>
      <p id="regionResult" class="info"></p>
      <div id="cityWylqNote" class="info wylq-note"></div>

      <h2>③ 饮食偏好（可多选）</h2>
      <div id="preferences">
        <label><input type="checkbox" value="素食"> 素食</label>
        <label><input type="checkbox" value="忌海鲜"> 忌海鲜</label>
        <label><input type="checkbox" value="忌辛辣"> 忌辛辣</label>
        <label><input type="checkbox" value="忌羊肉"> 忌羊肉</label>
        <label><input type="checkbox" value="忌酒"> 忌酒</label>
      </div>

      <button id="submitBtn" class="btn">✨ 生成我的药膳推荐</button>
    </div>

    <div id="resultSection" style="display: none;">
      <h2>📋 您的体质结果</h2>
      <p id="constitutionResult" class="highlight"></p>
      <p id="regionDisplay"></p>
      <p id="seasonDisplay"></p>

      <!-- 运气分析结果 -->
      <div class="panel analysis-panel" id="analysisPanel">
        <div class="panel-header">
          <span class="panel-icon">🔍</span>
          <span>运气+天气综合分析</span>
        </div>
        <div id="analysisContent"></div>
      </div>

      <h2>🍲 推荐药膳</h2>
      <div id="dietCards"></div>

      <button id="backBtn" class="btn secondary">⟲ 重新测评</button>
    </div>

    <footer class="disclaimer">
      ⚠️ 本工具仅为中医食疗养生参考，不构成医疗诊断。因个人体质差异，食用前请咨询专业医师。<br>
      天气数据来源：Open-Meteo（免费开放API）
    </footer>
  </div>

  <script src="wuyunliuqi.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
